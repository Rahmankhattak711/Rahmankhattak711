name: Metrics
on:
  schedule: [{cron: "0 0 * * *"}]
  workflow_dispatch:

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          
          filename: github-metrics.svg
          template: classic     # Changed from terminal → classic (cleaner & darker)
          
          base: header, activity, community, repositories, metadata
          
          config_timezone: Asia/Karachi
          config_order: base.header, isocalendar, languages, lines, habits, followup, base.repositories
          config_padding: 8%
          config_font_size: 14
          
          # Isometric Calendar
          plugin_isocalendar: yes
          plugin_isocalendar_duration: half-year
          
          # Languages
          plugin_languages: yes
          plugin_languages_ignored: html,css,mdx,json
          plugin_languages_details: bytes-size, percentage
          plugin_languages_sections: most-used
          plugin_languages_indepth: yes
          
          # Habits & Activity
          plugin_habits: yes
          plugin_habits_from: 200
          plugin_habits_days: 14
          plugin_habits_facts: yes
          plugin_habits_charts: yes
          
          plugin_lines: yes
          plugin_followup: yes
          
          # Pagespeed
          plugin_pagespeed: yes
          plugin_pagespeed_url: https://rahmankhattak.com   # Change if needed
