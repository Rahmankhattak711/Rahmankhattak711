name: Metrics
on:
  schedule: [{cron: "0 0 * * *"}]
  workflow_dispatch:

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          
          # Core settings to match the screenshot style
          filename: github-metrics.svg
          template: terminal
          base: header, activity, community, repositories, metadata
          
          # Timezone & ordering to match the layout
          config_timezone: Asia/Karachi
          config_order: base.header, isocalendar, languages, lines, habits, followup, base.repositories
          
          # Typography & sizing - closer to 12-14px readability
          config_padding: 6%
          font_type: mono
          font_font: "JetBrains Mono, Fira Code, Menlo, monospace"
          # These help increase effective text size in the terminal template
          config_font_size: 13
          
          # Layout tweaks for a cleaner, more spacious look like the image
          config_align: left
          
          # 📅 3D Isometric Calendar (matches the green blocks in the image)
          plugin_isocalendar: yes
          plugin_isocalendar_duration: half-year
          
          # 💻 Language metrics
          plugin_languages: yes
          plugin_languages_ignored: html, css, mdx, json
          plugin_languages_details: bytes-size, percentage, lines
          plugin_languages_sections: most-used
          plugin_languages_indepth: yes
          plugin_languages_limit: 8
          
          # 📊 Lines of code & activity
          plugin_lines: yes
          plugin_lines_sections: base
          
          # 📈 Follow-up / recent activity
          plugin_followup: yes
          plugin_followup_sections: user
          
          # 💡 Coding habits (matches the bar charts and facts)
          plugin_habits: yes
          plugin_habits_from: 200
          plugin_habits_days: 14
          plugin_habits_facts: yes
          plugin_habits_charts: yes
          plugin_habits_trim: yes
          
          # 🌐 Pagespeed / Performance cards (top right in the image)
          plugin_pagespeed: yes
          plugin_pagespeed_url: https://your-website.com  # ← Change to your site
          plugin_pagespeed_token: ${{ secrets.PAGESPEED_TOKEN }}  # Optional, for more accurate results
          
          # Extra polish
          plugin_achievements: yes
          plugin_achievements_display: compact
