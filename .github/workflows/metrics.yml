name: Metrics
on:
  schedule: [{cron: "0 0 * * *"}]
  workflow_dispatch:
jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}

          # Options & Premium Layout Styling
          filename: github-metrics.svg
          template: terminal
          base: header, activity, community, repositories, metadata
          config_timezone: Asia/Karachi
          config_order: base.header, isocalendar, languages, lines, habits, followup, base.repositories

          # Custom Pro Typography & Frame Sizing
          config_padding: 6%
          font_font: "JetBrains Mono, Fira Code, Segoe UI, sans-serif"

          # 📅 Beautiful 3D Isometric Calendar
          plugin_isocalendar: yes
          plugin_isocalendar_duration: half-year

          # 💻 Deep Language Metrics Matrix
          plugin_languages: yes
          plugin_languages_ignored: html, css, mdx
          plugin_languages_details: bytes-size, percentage
          plugin_languages_sections: most-used
          plugin_languages_indepth: yes # Computes language analytics across all commits
          plugin_languages_limit: 8

          # 🧮 Granular Code Metrics & Lines of Code Changed
          plugin_lines: yes
          plugin_lines_sections: base

          # 📊 Repository Milestones & Push Followup Trends
          plugin_followup: yes
          plugin_followup_sections: user

          # 💡 Advanced Coding Habits & Efficiency Tracking
          plugin_habits: yes
          plugin_habits_from: 200
          plugin_habits_days: 14
          plugin_habits_facts: yes # Enables specific textual analytics insights about your habits
          plugin_habits_charts: yes
          plugin_habits_trim: yes
