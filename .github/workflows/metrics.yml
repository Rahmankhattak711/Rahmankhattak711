name: Metrics
on:
  schedule: [{cron: "0 0 * * *"}]
  workflow_dispatch:

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          
          filename: github-metrics.svg
          template: classic          # Clean & modern look
          
          base: header, activity, community, repositories, metadata
          
          # Layout & Readability
          config_timezone: Asia/Karachi
          config_padding: 10%
          config_font_size: 10
          font_type: poppins
          
          # Order of sections (simple & logical)
          config_order: base.header, isocalendar, languages, habits, lines, followup, base.repositories
          
          # Isometric Calendar
          plugin_isocalendar: yes
          plugin_isocalendar_duration: half-year
          
          # Languages - Clean list
          plugin_languages: yes
          plugin_languages_ignored: html,css,mdx,json,yaml
          plugin_languages_details: percentage, bytes-size
          plugin_languages_sections: most-used
          plugin_languages_limit: 10
          
          # Habits & Activity
          plugin_habits: yes
          plugin_habits_days: 14
          plugin_habits_facts: yes
          plugin_habits_charts: yes
          
          plugin_lines: yes
          plugin_followup: yes
          
          # Pagespeed (optional - remove if you want it simpler)
          plugin_pagespeed: yes
          plugin_pagespeed_url: https://rahmankhattak.com   # ← Update or remove this line
